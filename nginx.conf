# =============================================================
# NGINX CONFIGURATION — LaporKu Production
# =============================================================
# Penerapan virtual directory / path aliasing / URL masking
# untuk melindungi struktur direktori dan file dari eksposur.
#
# Poin yang dipenuhi:
#   - URL Masking     : client hanya melihat /api dan /uploads,
#                       tidak tahu port atau path asli backend
#   - Virtual Directory : /uploads di-alias ke folder asli server
#                         tanpa mengekspos path disk
#   - Path Aliasing   : semua request /api/* diteruskan ke
#                       backend tanpa client tahu portnya
#   - Proteksi file   : direktori internal tidak bisa diakses
#                       langsung dari browser
# =============================================================

# ── Rate limiting — cegah brute force ────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

server {
    listen      80;
    listen      [::]:80;
    server_name laporku.app www.laporku.app;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name laporku.app www.laporku.app;

    # ── SSL ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/laporku.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/laporku.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Sembunyikan versi Nginx ───────────────────────────────
    server_tokens off;

    # ── Gzip ─────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # ── Root: serve React frontend (Vite build output) ───────
    root  /var/www/laporku/web/dist;
    index index.html;

    # ── URL MASKING: /api/* → backend Express (port 3001) ────
    # Client hanya tahu /api, tidak tahu ada server di port 3001
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # Sembunyikan header yang mengekspos teknologi backend
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;
    }

    # ── Rate limit khusus endpoint auth ──────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── VIRTUAL DIRECTORY: /uploads → folder file di server ──
    # URL publik /uploads tidak mengekspos path disk asli
    # (/var/www/laporku/backend/uploads)
    location /uploads/ {
        alias       /var/www/laporku/backend/uploads/;

        # Keamanan: larang eksekusi file di folder uploads
        location ~* \.(php|js|py|sh|exe)$ {
            deny all;
            return 403;
        }

        # Cache gambar di browser
        expires     30d;
        add_header  Cache-Control "public, immutable";

        # Sembunyikan listing direktori
        autoindex   off;

        # Hanya izinkan file gambar dan dokumen
        location ~* \.(jpg|jpeg|png|gif|webp|pdf)$ {
            try_files $uri =404;
        }
    }

    # ── Proteksi: blokir akses ke file sensitif ───────────────
    # File .env, .git, config tidak bisa diakses dari luar
    location ~ /\.(env|git|htaccess|DS_Store) {
        deny all;
        return 403;
    }

    location ~ /(node_modules|src|prisma|backend)/ {
        deny all;
        return 403;
    }

    # ── SSE (Server-Sent Events) untuk real-time notifikasi ──
    location /api/notifikasi/stream {
        proxy_pass             http://127.0.0.1:3001;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_http_version     1.1;
        proxy_set_header       Connection        '';
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        chunked_transfer_encoding on;
    }

    # ── SPA fallback: semua route → index.html ────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }
}